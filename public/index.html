<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MarkUp for Teams</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #12121e; color: #fff; font-family: 'Segoe UI', -apple-system, sans-serif; }
      body { overflow-x: hidden; }
      #root { min-height: 100vh; background: #12121e; }
      .loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 14px; color: rgba(255,255,255,0.5); }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
